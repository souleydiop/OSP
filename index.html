<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a1628">
    <link rel="manifest" href="manifest.json">
    <title>FibreOps — Incidents Fibre</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0a1628; --surf: #0f1f3d; --panel: #162040; --bord: #1e3058;
            --cyan: #00e5ff; --red: #ff3d5a; --warn: #ffb020; --ok: #00e676;
            --muted: #4a6080; --txt: #c8daf0; --txth: #eaf3ff;
            --mono: 'Courier New', monospace; --sans: system-ui, sans-serif;
        }
        html, body {
            height: 100%; background: var(--bg); color: var(--txt);
            font-family: var(--sans); font-size: 14px; overflow: hidden;
        }
        #app { display: flex; flex-direction: column; height: 100vh; }
        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; height: 50px; background: var(--surf);
            border-bottom: 1px solid var(--bord); z-index: 100; flex-shrink: 0;
        }
        .logo-text { font-family: var(--mono); font-size: 15px; font-weight: 700; color: var(--cyan); }
        .logo-sub { font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }
        .logo { display: flex; align-items: center; gap: 10px; }
        #hdr-r { display: flex; gap: 8px; align-items: center; }
        #inc-b { font-family: var(--mono); font-size: 12px; color: var(--muted); }
        #main { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        /* SIDEBAR */
        #sb {
            width: 310px; background: var(--surf); border-right: 1px solid var(--bord);
            display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
            transition: width .2s;
        }
        #sb.hide { width: 0; }
        .sb-in { width: 310px; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        #sb-tog {
            position: absolute; left: 310px; top: 50%; transform: translateY(-50%);
            z-index: 200; background: var(--surf); border: 1px solid var(--bord);
            border-left: none; border-radius: 0 5px 5px 0; padding: 8px 5px;
            cursor: pointer; color: var(--muted); transition: left .2s;
        }
        #sb.hide ~ #sb-tog { left: 0; }
        .tabs { display: flex; border-bottom: 1px solid var(--bord); flex-shrink: 0; }
        .tab {
            flex: 1; padding: 9px 4px; font-size: 11px; font-weight: 600;
            text-transform: uppercase; letter-spacing: .7px; color: var(--muted);
            background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent;
            transition: all .15s;
        }
        .tab.on { color: var(--cyan); border-bottom-color: var(--cyan); }
        .tc { display: none; flex: 1; overflow-y: auto; padding: 11px; flex-direction: column; gap: 9px; }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <div class="logo">
                <span class="logo-text">FibreOps</span>
                <span class="logo-sub">Incidents</span>
            </div>
            <div id="hdr-r">
                <span id="inc-b">Statut: OK</span>
            </div>
        </header>
        
        <div id="main">
            <div id="sb">
                <div class="sb-in">
                    <div class="tabs">
                        <button class="tab on">Actifs</button>
                        <button class="tab">Archives</button>
                    </div>
                    <div class="tc" style="display: flex;">
                        <p>Liste des incidents...</p>
                    </div>
                </div>
            </div>
            <button id="sb-tog">&lt;</button>
        </div>
    </div>
</body>
</html>
